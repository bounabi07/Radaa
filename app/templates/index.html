<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radaa - Cyber Security Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="lang-menu-container">
        <div class="lang-circle-btn" onclick="toggleLangMenu()">🌐</div>
        <div class="lang-dropdown" id="langDropdown">
            <a href="javascript:void(0)" onclick="changeLanguage('ar')">العربية (AR)</a>
            <a href="javascript:void(0)" onclick="changeLanguage('en')">English (EN)</a>
            <a href="javascript:void(0)" onclick="changeLanguage('fr')">Français (FR)</a>
            <a href="javascript:void(0)" onclick="changeLanguage('ary')">الدارجة (ARY)</a>
        </div>
    </div>

    <header>
        <h1 data-i18n="welcome"><i class="fa-solid fa-shield-halved"></i> welcome to Radaa</h1>
        <hr>
    </header>

    {% include 'navbar.html' %}
    
    <p data-i18n="description" style="text-align: center; color: #94a3b8;">Welcome to Radaa a platform that ensures you are safe from spam</p>

    <div class="grid-container">
        <a href="{{ url_for('main.messages_page') }}" class="cube-link" data-i18n="msg">Messages</a>
        <a href="{{ url_for('main.links') }}" class="cube-link" data-i18n="lnk">Links</a>
        <a href="{{ url_for('main.detect') }}" class="cube-link" data-i18n="det">Detect by Ai</a>
        <a href="{{ url_for('main.files_page') }}" class="cube-link" data-i18n="fil">files</a>
        <a href="{{ url_for('main.advice') }}" class="cube-link full-width" data-i18n="adv">Advice</a>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
